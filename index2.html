<!DOCTYPE html>
<html>

<head>
	<title>Simple Map</title>
	<meta name="viewport" content="initial-scale=1.0">
	<meta charset="utf-8">
	<link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet">

	<style>
	/* Always set the map height explicitly to define the size of the div
	   * element that contains the map. */

	#map {
		height: 100%;
	}
	/* Optional: Makes the sample page fill the window. */

	html,
	body {
		height: 100%;
		margin: 0;
		padding: 0;
	}
	h1{
		font-family: 'Roboto', sans-serif;
		position: absolute;
		top: 20px;
		left: 0;
		right: 0;
		margin: 0 auto; 
		z-index: 999;
		text-align: center;
	}
	</style>
</head>

<body>
	<h1>You are here</h1>
	<div id="map"></div>
	<script src="https://code.jquery.com/jquery-3.3.1.min.js" integrity="sha256-FgpCb/KJQlLNfOu91ta32o/NMZxltwRo8QtmkMRdAu8=" crossorigin="anonymous"></script>
	<script>
		var lat = 0;
		var lng = 0;
		var map;
		if (navigator.geolocation) {
			var url = "https://www.googleapis.com/geolocation/v1/geolocate?key=AIzaSyCDBxrvAOf3lEpgr31Q1QXgTk70HAcVyU8";
			$.post(url, function(res) {
				lat = res.location.lat;
				lng = res.location.lng;
				locate(lat,lng);
			});
		} else {
			alert("geolocation not supported");
		}
		function locate(lat,lng){
			map = new google.maps.Map(document.getElementById('map'), {
				center: { lat: lat, lng: lng },
				zoom: 10
			});
			var marker = new google.maps.Marker({position: {lat: lat, lng: lng}, map: map});
		}
		function initMap() { } // default function of google maps
	</script>
	<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAvEf1waSEntO3T58kt17Nifd_xpXd-a2I&callback=initMap" async defer></script>
</body>

</html>
